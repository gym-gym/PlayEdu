server:
  port: ${SERVER_PORT:9898}
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  aop:
    auto: true
    proxy-target-class: true
  servlet:
    multipart:
      enabled: true
      max-request-size: 15MB
      max-file-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:playedu}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true"
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: ${DB_POOL_MIN_IDLE:1}              # 最小连接数
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}        # 最大连接数
      connection-timeout: ${DB_POOL_CONN_TIMEOUT:30000} # 获取连接超时时间(ms)
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}     # 空闲连接超时时间(ms)
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}    # 连接最大存活时间(ms)
      auto-commit: true                                # 自动提交
  # 线程池配置
  task:
    execution:
      pool:
        max-size: 4 #最大线程数量
        core-size: 2 #初始化线程数量
        queue-capacity: 10000 #队列最大长度
        keep-alive: 60s #线程终止前允许保存的最大时间
      shutdown:
        await-termination: true
      thread-name-prefix: "playedu-default-thread"

mybatis:
  mapper-locations: classpath:mapper/*.xml

mybatis-plus:
  global-config:
    banner: false

sa-token:
  is-print: false
  token-name: "Authorization"
  timeout: 1296000 #token有效期[单位:秒,默认15天]
  is-concurrent: ${SA_TOKEN_IS_CONCURRENT:false} #限制同时登录
  is-share: false
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:playeduxyz}
  token-prefix: "Bearer"
  is-log: false
  log-level: "warn"

playedu:
  core:
    testing: false
  limiter:
    duration: 60
    limit: 360
  demo:
    # 演示模式开关。开启后，资源删除接口将仅删除 DB 记录，
    # 跳过 S3 文件删除，用于配合 DB 定时恢复搭建演示站。
    # 通过环境变量 DEMO_MODE 控制（docker-compose 里映射为 PLAYEDU_DEMO_MODE）。
    enabled: ${DEMO_MODE:false}
